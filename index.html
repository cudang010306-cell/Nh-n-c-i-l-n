<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhậu không?</title>
<style>
body {
  background: black;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
  margin: 0;
  padding: 40px 0;
  overflow: hidden;
}

/* Tiêu đề & nội dung */
h1 { font-size: 2.5em; margin-bottom: 12px; }
p { font-size: 1.2em; margin-bottom: 24px; }

/* Nút */
button {
  padding: 10px 20px;
  font-size: 16px;
  border: 2px solid #00ffcc;
  background: transparent;
  color: #00ffcc;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px;
}
button:hover { background: #00ffcc; color: black; }

/* Popup Không */
#popupOverlay {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#popupBox {
  background: #222;
  color: white;
  padding: 20px;
  border-radius: 12px;
  border: 2px solid #00ffcc;
  width: 80%;
  max-width: 320px;
  text-align: center;
}

#popupBox p { margin: 8px 0 16px; font-size: 1.1em; }
#popupBox button {
  background: #00ffcc;
  border: none;
  color: black;
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>⚡ REQUEST ⚡</h1>
<p>Cho xin 1 ngày rảnh</p>
<p>Mục đích: NHẬU 🍻</p>

<button id="acceptBtn">Chấp nhận</button>
<button id="noBtn">Không 😏</button>

<!-- Popup cho nút Không -->
<div id="popupOverlay">
  <div id="popupBox">
    <p>
      Bạn bè nói nghĩa nói tình<br>
      Không đi nhậu được thì mình nghỉ chơi 😏
    </p>
    <button onclick="document.getElementById('popupOverlay').style.display='none'">OK</button>
  </div>
</div>

<script>
// Bấm nút Không hiển thị popup
const noBtn = document.getElementById("noBtn");
if(noBtn){
  noBtn.addEventListener("click", function(){
    document.getElementById("popupOverlay").style.display = "flex";
  });
}

// Nút Chấp nhận hiện alert
const acceptBtn = document.getElementById("acceptBtn");
acceptBtn.addEventListener("click", function(){
  alert("Kèo đã chốt 🍻");
});
</script>

</body>
</html>
